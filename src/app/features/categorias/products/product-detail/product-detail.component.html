<app-header></app-header>
<div class="product-detail-container">
  <div class="image-section">
    <div class="main-image">
      <img [src]="selectedImage" [alt]="product?.name" />
    </div>

    <div class="thumbnail-gallery">
      <img
        *ngFor="let img of product?.images"
        [src]="img"
        [alt]="product?.name"
        [class.active]="img === selectedImage"
        (click)="selectedImage = img"
      />
    </div>
  </div>

  <div class="info-section">
    <h2>{{ product?.name }}</h2>
    <p class="category">{{ product?.category }}</p>
    <p class="description">{{ product?.description }}</p>

    <div class="price">Precio: ${{ product?.price | number }}</div>

    <div class="buttons">
      <a
        class="btn-buy"
        [href]="'https://wa.me/573001112233?text=Hola!%20Quiero%20comprar%20el%20producto%20' + product?.name"
        target="_blank"
        >Comprar ahora</a
      >

      <a
        class="btn-custom"
        [href]="'https://wa.me/573001112233?text=Hola!%20Quiero%20personalizar%20el%20producto%20' + product?.name"
        target="_blank"
        >Personalizar diseño</a
      >
    </div>
  </div>
</div>
<app-footer></app-footer>
