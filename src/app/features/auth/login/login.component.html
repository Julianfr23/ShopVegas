<div class="soulprint-innovative">
  <!-- Efectos de fondo dinámicos -->
  <div class="dynamic-background">
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>
    <div class="floating-orb orb-3"></div>
    <div class="energy-wave"></div>
  </div>

  <div class="login-layout">
    <!-- Sección de marca creativa -->
    <div class="creative-brand">
      <div class="brand-experience">
        <!-- Logo animado CON IMAGEN -->
        <div class="animated-logo">
          <div class="logo-aura"></div>
          <div class="logo-core">
            <div class="logo-sparkle"></div>
            <div class="logo-image">
              <!-- REEMPLAZA ESTA RUTA CON LA DE TU LOGO -->
              <img src="assets/images/logo.png" alt="Soulprint Logo">
            </div>
          </div>
        </div>

        <!-- Contenido de marca -->
        <div class="brand-magic">
          <h1 class="magic-title">
            <span class="title-gradient">Soul</span>
            <span class="title-outline">print</span>
          </h1>
          <div class="title-underline">
            <div class="underline-glow"></div>
          </div>
          <p class="magic-subtitle">
            Donde cada diseño<br>cuenta tu historia
          </p>
        </div>

        <!-- Elementos interactivos -->
        <div class="interactive-elements">
          <div class="creative-dots">
            <div class="dot dot-1" style="background: #FFA6AB;"></div>
            <div class="dot dot-2" style="background: #FF7F0F;"></div>
            <div class="dot dot-3" style="background: #A1C3A4;"></div>
            <div class="dot dot-4" style="background: #D6B6C4;"></div>
          </div>
          <div class="floating-text">
            <span class="floating-word">Creatividad</span>
            <span class="floating-word">Innovación</span>
            <span class="floating-word">Calidad</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Sección de formulario futurista -->
    <div class="futuristic-form">
      <div class="form-portal">
        <!-- Efecto de portal -->
        <div class="portal-glow"></div>

        <div class="form-content">
          <div class="form-header-modern">
            <h2 class="modern-title">Bienvenido</h2>
            <p class="modern-subtitle">Ingresa a tu espacio creativo</p>
            <div class="header-pulse"></div>
          </div>

          <form class="innovative-form" (ngSubmit)="onSubmit()">
            <!-- Campo de email con efecto -->
            <div class="input-modern">
              <div class="input-orb"></div>
              <input
                type="email"
                class="modern-input"
                [(ngModel)]="email"
                name="email"
                placeholder=" "
                required>
              <label class="modern-label">
                <span class="label-glow">✉</span>
                Correo electrónico
              </label>
              <div class="input-trail"></div>
            </div>

            <!-- Campo de contraseña con efecto -->
            <div class="input-modern">
              <div class="input-orb"></div>
              <input
                type="password"
                class="modern-input"
                [(ngModel)]="password"
                name="password"
                placeholder=" "
                required>
              <label class="modern-label">
                <span class="label-glow">🔒</span>
                Contraseña
              </label>
              <div class="input-trail"></div>
            </div>

            <!-- Opciones modernas -->
            <div class="modern-options">
              <label class="future-checkbox">
                <input type="checkbox">
                <span class="check-future">
                  <span class="check-energy"></span>
                </span>
                <span class="check-label">Mantener sesión activa</span>
              </label>
              <a href="#" class="future-link">
                ¿Acceso perdido?
                <span class="link-sparkle"></span>
              </a>
            </div>

            <!-- Botón principal futurista -->
            <button type="submit" class="future-btn">
              <span class="btn-aura"></span>
              <span class="btn-content">
                <span class="btn-spark">✨</span>
                <span class="btn-text">Ingresar al Studio</span>
                <span class="btn-arrow">➜</span>
              </span>
              <div class="btn-energy"></div>
            </button>
          </form>

          <!-- Separador energético -->
          <div class="energy-divider">
            <div class="energy-node"></div>
            <span class="divider-pulse">Nueva energía creativa</span>
            <div class="energy-node"></div>
          </div>

          <!-- Botón de registro futurista -->
          <button class="future-register" (click)="goToRegister()">
            <span class="register-glow"></span>
            <span class="register-content">
              <span class="register-plus">+</span>
              <span class="register-text">Comenzar Journey</span>
            </span>
          </button>

          <!-- Mensaje inspirador -->
          <div class="inspiration-modern">
            <div class="quote-marks">"</div>
            <p>Cada estampado es una huella única de tu esencia</p>
            <div class="quote-marks">"</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Partículas flotantes -->
  <div class="floating-particles">
    <div class="particle" *ngFor="let particle of particles"
         [style.left]="particle.x + '%'"
         [style.top]="particle.y + '%'"
         [style.animation-delay]="particle.delay + 's'"
         [style.background]="particle.color">
    </div>
  </div>
</div>
