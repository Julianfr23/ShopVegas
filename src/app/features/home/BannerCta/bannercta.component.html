<!-- banner-cta.component.html -->
<section class="sp-banner-cta">

  <!-- Decoración fondo -->
  <div class="bct-deco bct-deco--1"></div>
  <div class="bct-deco bct-deco--2"></div>

  <div class="bct-inner">

    <!-- TEXTO -->
    <div class="bct-text">
      <span class="bct-eyebrow">Premium Customization</span>
      <h2 class="bct-title">
        Your design on<br>
        <em>any product</em>
      </h2>
      <p class="bct-sub">
        Upload your image, choose the product and we do the magic.
        Sublimation quality, colors that last.
      </p>
      <a class="bct-btn" routerLink="/custom-order">
        <i class="bi bi-palette2"></i>
        Customize Now
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </a>
    </div>

    <!-- VITRINA -->
    <div class="bct-showcase">

      <!-- Producto destacado rotativo -->
      <div class="bct-featured">
        <div class="bct-featured-img-wrap" style="cursor:pointer" [routerLink]="['/productos/view', products[activeProduct].id]">
          <img
            *ngFor="let p of products; let i = index"
            [src]="p.image"
            [alt]="p.name"
            class="bct-featured-img"
            [class.active]="i === activeProduct">
        </div>
        <div class="bct-featured-label">
          <span class="bct-featured-name">{{ products[activeProduct].name }}</span>
          <span class="bct-featured-badge">
            <i class="bi bi-patch-check-fill"></i> Customizable
          </span>
        </div>
      </div>

      <!-- Fila de miniaturas -->
      <div class="bct-thumbs">
        <button
          *ngFor="let p of products; let i = index"
          class="bct-thumb"
          [class.active]="i === activeProduct"
          (click)="setActive(i)"
          [attr.aria-label]="p.name">
          <div class="bct-thumb-img">
            <img [src]="p.image" [alt]="p.name">
          </div>
          <span>{{ p.name }}</span>
        </button>
      </div>

    </div>

  </div>

</section>
