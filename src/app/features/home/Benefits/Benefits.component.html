<section class="benefits-section py-5">
  <div class="container text-center mb-5">
    <h2 class="section-title">Por Qué Elegirnos</h2>
    <p class="section-subtitle">Beneficios que nos diferencian y generan confianza</p>
  </div>

  <div class="container">
    <div class="row g-4 justify-content-center">
      <div class="col-12 col-sm-6 col-lg-3" *ngFor="let b of items">
        <article class="benefit-card h-100">
          <div class="card-overlay"></div>
          <div class="icon-wrap">
            <i class="bi" [ngClass]="b.icon"></i>
          </div>
          <h3 class="title">{{ b.title }}</h3>
          <p class="text">{{ b.text }}</p>
        </article>
      </div>
    </div>
  </div>
</section>
