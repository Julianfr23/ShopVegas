
<!-- categories.component.html -->
<section class="sp-categories">
  <div class="section-header">
    <span class="section-eyebrow">Collections</span>
    <h2 class="section-title">Explore our <span>categories</span></h2>
    <p class="section-sub">Customize anything, any way you want</p>
  </div>

  <div class="categories-grid">
    <a class="cat-item"
       *ngFor="let c of categories; let i = index"
       [class.cat-item--large]="i === 0"
       [class.cat-item--tall]="i === 3"
       routerLink="/productos"
       [queryParams]="{categoria: c.id}">
      <img [src]="c.imageUrl" [alt]="c.name">
      <div class="cat-overlay">
        <div class="cat-overlay-top">
          <span class="cat-tag-pill">{{ c.tag }}</span>
          <span class="cat-count-pill">{{ c.count }} items</span>
        </div>
        <div class="cat-overlay-bottom">
          <span class="cat-name">{{ c.name }}</span>
          <span class="cat-from">from ${{ c.fromPrice | number:'1.2-2' }}</span>
        </div>
        <span class="cat-arrow">→</span>
      </div>
    </a>
  </div>

  <div class="categories-cta">
    <a routerLink="/categorias" class="btn-outline">
      View all categories
      <i class="bi bi-arrow-right"></i>
    </a>
  </div>
</section>
